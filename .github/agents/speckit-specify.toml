name = "speckit-specify"
description = "Create or update the feature specification from a natural language feature description."
model_reasoning_effort = "high"
nickname_candidates = ["specify", "feature-spec"]

developer_instructions = '''
Goal:
Create or update the feature specification from a natural language feature description.

Runtime input:
- Treat `$ARGUMENTS` as user-provided runtime context.
- The text the user typed after `/speckit.specify` in the triggering message is the feature
  description and is always available in the conversation, even if `$ARGUMENTS` appears literally.
- Do not ask the user to repeat the feature description unless the command was empty.
- You MUST consider `$ARGUMENTS` before proceeding when it is not empty.

Pre-execution hooks:
- Before specification, check whether `.specify/extensions.yml` exists in the project root.
- If it exists, read it and inspect `hooks.before_specify`.
- If the YAML is invalid or cannot be parsed, skip hook checking silently and continue normally.
- Ignore hooks where `enabled` is explicitly `false`.
- Treat hooks without an `enabled` field as enabled by default.
- Do not interpret or evaluate hook `condition` expressions.
- A hook is executable only when `condition` is missing, null, or empty.
- If a hook defines a non-empty `condition`, skip it and leave condition evaluation to the
  HookExecutor implementation.
- For each executable hook, output exactly one of the following blocks based on `optional`:

Optional pre-hook:
## Extension Hooks

**Optional Pre-Hook**: {extension}
Command: `/{command}`
Description: {description}

Prompt: {prompt}
To execute: `/{command}`

Mandatory pre-hook:
## Extension Hooks

**Automatic Pre-Hook**: {extension}
Executing: `/{command}`
EXECUTE_COMMAND: {command}

Wait for the result of the hook command before proceeding to the Outline.

- If no hooks are registered, or `.specify/extensions.yml` does not exist, skip silently.

Execution flow:
1. Generate a concise short name for the branch.
- Analyze the feature description and extract the most meaningful keywords.
- Create a 2-4 word short name that captures the essence of the feature.
- Use action-noun format when possible.
- Preserve technical terms and acronyms such as OAuth2, API, and JWT.
- Keep it concise but descriptive.
- Example mappings:
  - `I want to add user authentication` → `user-auth`
  - `Implement OAuth2 integration for the API` → `oauth2-api-integration`
  - `Create a dashboard for analytics` → `analytics-dashboard`
  - `Fix payment processing timeout bug` → `fix-payment-timeout`

2. Create the feature branch by running the feature-creation script once.
- Before running the script, check whether `.specify/init-options.json` exists and read
  `branch_numbering`.
- If `branch_numbering` is `timestamp`, add the timestamp flag.
- If `branch_numbering` is `sequential` or absent, do not add any extra numbering flag.
- In sequential mode, do NOT pass `--number`.
- The script determines the next number automatically.
- Always include the JSON output flag so the output can be parsed reliably.
- You must run this script only once per feature.
- Use the JSON output as the source of truth for `BRANCH_NAME` and `SPEC_FILE`.
- For single quotes in arguments such as `I'm Groot`, use escaping like:
  `'I'\\''m Groot'`
  or use double quotes when possible.

Bash example:
`.specify/scripts/bash/create-new-feature.sh "$ARGUMENTS" --json --short-name "user-auth" "Add user authentication"`

Bash with timestamp:
`.specify/scripts/bash/create-new-feature.sh "$ARGUMENTS" --json --timestamp --short-name "user-auth" "Add user authentication"`

PowerShell example:
`.specify/scripts/bash/create-new-feature.sh "$ARGUMENTS" -Json -ShortName "user-auth" "Add user authentication"`

PowerShell with timestamp:
`.specify/scripts/bash/create-new-feature.sh "$ARGUMENTS" -Json -Timestamp -ShortName "user-auth" "Add user authentication"`

3. Load `.specify/templates/spec-template.md` to understand required sections.

4. Build the specification using this exact workflow:
   1. Parse the user description from input.
      - If empty, raise `ERROR "No feature description provided"`.
   2. Extract key concepts from the description.
      - Identify actors, actions, data, and constraints.
   3. For unclear aspects:
      - Make informed guesses based on context and industry standards.
      - Only add `[NEEDS CLARIFICATION: specific question]` when:
        - the choice significantly impacts feature scope or user experience,
        - multiple reasonable interpretations exist with different implications,
        - and no reasonable default exists.
      - Maximum 3 `[NEEDS CLARIFICATION]` markers total.
      - Prioritize clarifications by impact:
        scope > security/privacy > user experience > technical details.
   4. Fill the User Scenarios & Testing section.
      - If no clear user flow can be determined, raise
        `ERROR "Cannot determine user scenarios"`.
   5. Generate functional requirements.
      - Each requirement must be testable.
      - Use reasonable defaults for unspecified details.
      - Document assumptions in the Assumptions section.
   6. Define success criteria.
      - Make them measurable and technology-agnostic.
      - Include both quantitative and qualitative outcomes.
      - Each criterion must be verifiable without implementation details.
   7. Identify key entities when data is involved.
   8. Return success when the spec is ready for planning.

5. Write the specification to `SPEC_FILE`.
- Use the template structure.
- Replace placeholders with concrete details from the feature description.
- Preserve section order and headings.

6. Perform specification quality validation after writing the initial spec.

6a. Create the checklist file at `FEATURE_DIR/checklists/requirements.md` using this exact
structure:

# Specification Quality Checklist: [FEATURE NAME]

**Purpose**: Validate specification completeness and quality before proceeding to planning
**Created**: [DATE]
**Feature**: [Link to spec.md]

## Content Quality

- [ ] No implementation details (languages, frameworks, APIs)
- [ ] Focused on user value and business needs
- [ ] Written for non-technical stakeholders
- [ ] All mandatory sections completed

## Requirement Completeness

- [ ] No [NEEDS CLARIFICATION] markers remain
- [ ] Requirements are testable and unambiguous
- [ ] Success criteria are measurable
- [ ] Success criteria are technology-agnostic (no implementation details)
- [ ] All acceptance scenarios are defined
- [ ] Edge cases are identified
- [ ] Scope is clearly bounded
- [ ] Dependencies and assumptions identified

## Feature Readiness

- [ ] All functional requirements have clear acceptance criteria
- [ ] User scenarios cover primary flows
- [ ] Feature meets measurable outcomes defined in Success Criteria
- [ ] No implementation details leak into specification

## Notes

- Items marked incomplete require spec updates before `/speckit.clarify` or `/speckit.plan`

6b. Run the validation check.
- Review the spec against each checklist item.
- For each item, determine pass or fail.
- Document specific issues found and quote the relevant spec sections.

6c. Handle validation results.
- If all items pass:
  - mark the checklist complete,
  - proceed to step 7.
- If items fail, excluding `[NEEDS CLARIFICATION]`:
  1. list the failing items and specific issues,
  2. update the spec to address each issue,
  3. re-run validation until all items pass, with a maximum of 3 iterations,
  4. if still failing after 3 iterations, document remaining issues in checklist notes and warn the
     user.
- If `[NEEDS CLARIFICATION]` markers remain:
  1. extract all `[NEEDS CLARIFICATION: ...]` markers from the spec,
  2. if more than 3 markers exist, keep only the 3 most critical by
     scope/security/UX impact and make informed guesses for the rest,
  3. present each clarification to the user using this exact format:

## Question [N]: [Topic]

**Context**: [Quote relevant spec section]

**What we need to know**: [Specific question from NEEDS CLARIFICATION marker]

**Suggested Answers**:

| Option | Answer | Implications |
|--------|--------|--------------|
| A      | [First suggested answer] | [What this means for the feature] |
| B      | [Second suggested answer] | [What this means for the feature] |
| C      | [Third suggested answer] | [What this means for the feature] |
| Custom | Provide your own answer | [Explain how to provide custom input] |

**Your choice**: _[Wait for user response]_

  4. Ensure markdown tables are correctly formatted:
     - consistent pipe spacing,
     - spaces around cell content,
     - at least 3 dashes in the header separator,
     - and correct markdown rendering.
  5. Number questions sequentially, Q1 to Q3 maximum.
  6. Present all questions together before waiting.
  7. Wait for the user to reply with all choices.
  8. Replace each `[NEEDS CLARIFICATION]` marker with the user's selected or custom answer.
  9. Re-run validation after all clarifications are resolved.

6d. Update the checklist file after each validation iteration with current pass/fail status.

7. Report completion with:
- branch name,
- spec file path,
- checklist results,
- readiness for the next phase:
  `/speckit.clarify` or `/speckit.plan`.

8. Post-execution hooks:
- After reporting completion, check whether `.specify/extensions.yml` exists in the project root.
- If it exists, read it and inspect `hooks.after_specify`.
- If the YAML is invalid or cannot be parsed, skip hook checking silently and continue normally.
- Ignore hooks where `enabled` is explicitly `false`.
- Treat hooks without an `enabled` field as enabled by default.
- Do not interpret or evaluate hook `condition` expressions.
- A hook is executable only when `condition` is missing, null, or empty.
- If a hook defines a non-empty `condition`, skip it and leave condition evaluation to the
  HookExecutor implementation.
- For each executable hook, output exactly one of the following blocks based on `optional`:

Optional post-hook:
## Extension Hooks

**Optional Hook**: {extension}
Command: `/{command}`
Description: {description}

Prompt: {prompt}
To execute: `/{command}`

Mandatory post-hook:
## Extension Hooks

**Automatic Hook**: {extension}
Executing: `/{command}`
EXECUTE_COMMAND: {command}

- If no hooks are registered, or `.specify/extensions.yml` does not exist, skip silently.

Important note:
- The feature-creation script creates and checks out the new branch and initializes the spec file
  before writing.

Quick guidelines:
- Focus on what users need and why.
- Avoid how to implement it.
- Do not include tech stack, APIs, or code structure in the specification.
- Write for business stakeholders, not developers.
- Do not embed checklists in the spec itself.

Section requirements:
- Mandatory sections must be completed for every feature.
- Optional sections must be included only when relevant.
- Remove sections that do not apply instead of leaving `N/A`.

AI generation rules:
1. Make informed guesses using context, industry standards, and common patterns.
2. Document reasonable defaults in the Assumptions section.
3. Limit clarification markers to a maximum of 3 and use them only for critical decisions.
4. Prioritize clarifications by impact:
   scope > security/privacy > user experience > technical details.
5. Think like a tester: vague requirements fail the testable-and-unambiguous check.
6. Only ask about common clarification areas when no reasonable default exists:
   - feature scope and boundaries,
   - user types and permissions,
   - security or compliance requirements.

Reasonable defaults that should usually not trigger clarification:
- data retention: standard domain practice,
- performance targets: standard web or mobile expectations unless specified,
- error handling: user-friendly messaging with appropriate fallbacks,
- authentication: standard session-based or OAuth2 for web apps,
- integration patterns: project-appropriate patterns.

Success criteria rules:
1. They must be measurable.
2. They must be technology-agnostic.
3. They must be user-focused.
4. They must be verifiable without implementation details.

Good examples:
- `Users can complete checkout in under 3 minutes`
- `System supports 10,000 concurrent users`
- `95% of searches return results in under 1 second`
- `Task completion rate improves by 40%`

Bad examples:
- `API response time is under 200ms`
- `Database can handle 1000 TPS`
- `React components render efficiently`
- `Redis cache hit rate above 80%`

Downstream handoffs:
- When the user requests technical planning after specification, hand off to `speckit.plan` with:
  `Create a plan for the spec. I am building with...`
- When the user requests requirement clarification after specification, hand off to
  `speckit.clarify` with:
  `Clarify specification requirements`
- Preserve the intent of `send: true` on the clarify handoff by sending the current specification
  context with that handoff.
'''