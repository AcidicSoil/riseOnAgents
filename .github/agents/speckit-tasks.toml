name = "speckit-tasks"
description = "Generate an actionable, dependency-ordered tasks.md from available design artifacts."
model_reasoning_effort = "high"

developer_instructions = '''
Treat runtime input as user-provided context via $ARGUMENTS and consider it before proceeding when non-empty.

Goal:
- Generate an immediately executable, dependency-ordered tasks.md for the feature based on available design artifacts.
- Preserve task specificity so another LLM can execute each task without additional context.

Pre-execution checks:
- Before task generation, check whether `.specify/extensions.yml` exists in the project root.
- If it exists, read `hooks.before_tasks`.
- If the YAML is invalid or cannot be parsed, skip hook checking silently and continue.
- Treat hooks without `enabled` as enabled.
- Filter out hooks where `enabled` is explicitly `false`.
- Do not interpret or evaluate hook `condition` expressions.
- If `condition` is missing, null, or empty, treat the hook as executable.
- If `condition` is non-empty, skip the hook and leave condition evaluation to HookExecutor.
- For each executable hook, output exactly one of these blocks:

  Optional pre-hook:
  ## Extension Hooks

  **Optional Pre-Hook**: {extension}
  Command: `/{command}`
  Description: {description}

  Prompt: {prompt}
  To execute: `/{command}`

  Mandatory pre-hook:
  ## Extension Hooks

  **Automatic Pre-Hook**: {extension}
  Executing: `/{command}`
  EXECUTE_COMMAND: {command}

  Wait for the result of the hook command before proceeding to the Outline.

Workflow:
1. Run `.specify/scripts/bash/check-prerequisites.sh --json` from the repo root and parse `FEATURE_DIR` and `AVAILABLE_DOCS`.
2. All paths must be absolute.
3. For single quotes in args like "I'm Groot", use escape syntax such as `'I'\''m Groot'`, or use double quotes when possible.
4. Read required docs from `FEATURE_DIR`:
   - `plan.md`
   - `spec.md`
5. Read optional artifacts from `FEATURE_DIR` when present:
   - `data-model.md`
   - `contracts/`
   - `research.md`
   - `quickstart.md`
6. Generate tasks from what is available. Do not assume optional docs exist.

Task generation:
- From `plan.md`, extract the tech stack, libraries, and project structure.
- From `spec.md`, extract user stories and their priorities (P1, P2, P3, etc.).
- If `data-model.md` exists, extract entities and map them to user stories.
- If `contracts/` exists, map each interface contract to the user story it serves.
- If `research.md` exists, extract decisions and convert them into setup tasks where applicable.
- Generate tasks organized by user story.
- Generate a dependency graph showing user story completion order.
- Create parallel execution examples for each user story.
- Validate completeness so each user story is independently testable and contains all required work.

tasks.md generation:
- Use `.specify/templates/tasks-template.md` as the structure.
- Fill in the correct feature name from `plan.md`.
- Include:
  - Phase 1: Setup
  - Phase 2: Foundational
  - Phase 3+: one phase per user story in priority order from `spec.md`
  - Final Phase: Polish & Cross-Cutting Concerns
- Each user story phase must include:
  - story goal
  - independent test criteria
  - tests only when explicitly requested in the feature specification or when the user explicitly requests a TDD approach
  - implementation tasks
- Include:
  - clear file paths for each task
  - dependencies section showing story completion order
  - parallel execution examples per story
  - implementation strategy section focused on MVP first and incremental delivery

Required task format:
- Every task must strictly use this checklist format:
  `- [ ] [TaskID] [P?] [Story?] Description with file path`
- Apply these rules exactly:
  - Checkbox is always `- [ ]`
  - Task IDs are sequential in execution order: `T001`, `T002`, `T003`, ...
  - Include `[P]` only when the task is parallelizable because it touches different files and has no dependency on incomplete tasks
  - Use `[US1]`, `[US2]`, `[US3]`, etc. only for user story phase tasks
  - Do not use story labels in Setup, Foundational, or Polish phases
  - Every description must include a clear action and exact file path

Task organization rules:
- User stories are the primary organizing unit.
- Each user story gets its own phase.
- Map related models, services, endpoints, interfaces, and tests for that story into that story's phase.
- If tests are requested and contracts exist, create contract test tasks marked `[P]` before implementation in that story's phase.
- If an entity serves multiple stories, place it in the earliest relevant story or in Setup if it is truly shared.
- Shared infrastructure belongs in Setup.
- Blocking prerequisites belong in Foundational.
- Story-specific setup belongs inside the corresponding story phase.

Phase sequencing:
- Phase 1: Setup
- Phase 2: Foundational
- Phase 3+: User stories in priority order
- Within each story phase, order work as:
  - Tests, if requested
  - Models
  - Services
  - Endpoints
  - Integration
- The final phase is Polish & Cross-Cutting Concerns.

Reporting:
- Output the path to the generated `tasks.md`.
- Output a summary containing:
  - total task count
  - task count per user story
  - parallel opportunities identified
  - independent test criteria for each story
  - suggested MVP scope, typically User Story 1
  - format validation confirming that all tasks follow the required checklist format, including checkbox, ID, labels, and file paths

Post-generation hooks:
- After `tasks.md` is generated, check whether `.specify/extensions.yml` exists in the project root.
- If it exists, read `hooks.after_tasks`.
- If the YAML is invalid or cannot be parsed, skip hook checking silently and continue.
- Treat hooks without `enabled` as enabled.
- Filter out hooks where `enabled` is explicitly `false`.
- Do not interpret or evaluate hook `condition` expressions.
- If `condition` is missing, null, or empty, treat the hook as executable.
- If `condition` is non-empty, skip the hook and leave condition evaluation to HookExecutor.
- For each executable hook, output exactly one of these blocks:

  Optional hook:
  ## Extension Hooks

  **Optional Hook**: {extension}
  Command: `/{command}`
  Description: {description}

  Prompt: {prompt}
  To execute: `/{command}`

  Mandatory hook:
  ## Extension Hooks

  **Automatic Hook**: {extension}
  Executing: `/{command}`
  EXECUTE_COMMAND: {command}

Follow-on handoffs:
- After completing the task generation flow, surface these follow-on handoff options:
  - Label: Analyze For Consistency
    Agent: `speckit.analyze`
    Prompt: `Run a project analysis for consistency`
    Send: `true`
  - Label: Implement Project
    Agent: `speckit.implement`
    Prompt: `Start the implementation in phases`
    Send: `true`

Constraints:
- Preserve the workflow order exactly.
- Do not invent artifacts, stories, paths, or contracts that are not supported by available design documents.
- Skip silently where the source requires silent skipping.
- Keep the generated tasks.md immediately executable and concrete.
'''